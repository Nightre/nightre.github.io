<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享测试页</title>
    <style>
        /* 随便写点样式让按钮好看点 */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .share-btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #12b7f5; /* QQ蓝 */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .share-btn:hover { background-color: #0e9dd2; }
    </style>
</head>
<body>

    <!-- 点击这个按钮就会触发分享 -->
    <button class="share-btn" onclick="shareToQQ()">分享惊天大瓜到QQ</button>

    <script>
        function shareToQQ() {
            // 🎵 1. 真实的跳转链接（你的 Rickroll 视频）
            const targetUrl = 'https://www.bilibili.com/video/BV1GJ411x7h7';
            
            // 😈 2. 伪装的卡片标题（越吸引人越好）
            const title = '关于我被程序老哥背叛了这件事...';
            
            // 😈 3. 伪装的卡片摘要/描述
            const summary = '[分享] 忍体苦手 2026-3-4';
            
            // 😈 4. 伪装的封面图（必须是 http/https 的真实图片，找一张车祸或新闻的网图最好）
            const pic = 'https://ibb.co/WWsTy5Q7'; 

            // ⚙️ 5. 拼接腾讯官方的分享协议 URL（参数必须 encodeURIComponent 转义）
            const qqShareUrl = 'http://connect.qq.com/widget/shareqq/index.html' +
                '?url=' + encodeURIComponent(targetUrl) +
                '&title=' + encodeURIComponent(title) +
                '&summary=' + encodeURIComponent(summary) +
                '&pics=' + encodeURIComponent(pic);

            // 🚀 6. 打开分享窗口拉起 QQ
            // 在电脑端会弹出一个网页让你选群/好友，手机端会尝试直接拉起 QQ App
            window.open(qqShareUrl, '_blank');
        }
    </script>

</body>
</html>
