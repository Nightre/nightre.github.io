<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basic WebGPU</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            touch-action: none;
            background: #000;
        }
        #nextFrameBtn {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="960" height="620"></canvas>
    <button id="nextFrameBtn">Next Frame</button>
    <div id="instructions">
        PC: WASD to move, Mouse drag to rotate<br>
        Touch: 1 finger drag rotate, 2 fingers move forward
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
